<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e0d0b">
<title>Jigsaw Helper</title>
<style>
  :root {
    --bg: #0e0d0b;
    --panel: #1a1815;
    --line: #2a2622;
    --ink: #f4ead8;
    --dim: #8a7e6a;
    --accent: #e8a04a;
    --accent-soft: #c97e2c;
    --green: #8fbf6c;
    --blue: #6caee8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-serif, Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header {
    flex: 0 0 auto;
    padding: 10px 14px 8px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-size: 18px;
    letter-spacing: 0.04em;
    font-weight: 500;
    font-style: italic;
    flex: 0 0 auto;
  }
  header h1 span { color: var(--accent); }
  header .status {
    font-size: 10px;
    color: var(--dim);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.05em;
    text-align: right;
    line-height: 1.3;
  }
  header .status .ok { color: var(--green); }
  header .status .warn { color: var(--accent); }

  main {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 6px;
    min-height: 0;
  }
  .panel {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    min-height: 0;
  }
  .panel.large { flex: 1 1 65%; }
  .panel.small { flex: 1 1 35%; }
  .panel-label {
    position: absolute;
    top: 8px;
    left: 10px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
    background: rgba(0,0,0,0.55);
    padding: 4px 8px;
    border-radius: 999px;
    z-index: 5;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    pointer-events: none;
  }
  .panel-action {
    position: absolute;
    top: 8px;
    right: 10px;
    z-index: 5;
    background: rgba(0,0,0,0.55);
    color: var(--ink);
    border: none;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    cursor: pointer;
  }
  .panel-action:active { background: var(--accent-soft); }

  #camStage {
    position: relative;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  #camVideo, #camOverlay, #camFrozen {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #camFrozen { display: none; z-index: 1; }
  #camOverlay { z-index: 2; pointer-events: none; }

  .badge-stack {
    position: absolute;
    bottom: 10px;
    left: 10px;
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 4;
    pointer-events: none;
    flex-wrap: wrap;
    max-width: calc(100% - 20px);
  }
  .piece-badge {
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 28px;
  }
  .piece-badge .swatch-mini {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.2);
    background: #555;
  }
  .piece-badge.type {
    background: rgba(232,160,74,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .piece-badge.track {
    background: rgba(108, 174, 232, 0.18);
    border-color: var(--blue);
    color: var(--blue);
  }
  .piece-badge.track.weak {
    background: rgba(232, 160, 74, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .piece-badge.track.lost {
    background: rgba(217, 100, 70, 0.15);
    border-color: #d96446;
    color: #e9947b;
  }
  .piece-badge.hidden { display: none; }

  #refStage {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    position: relative;
    background: radial-gradient(circle at 30% 20%, #1f1c18 0%, #100f0d 70%);
  }
  #refImg, #refOverlay {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    will-change: transform;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }
  #refImg { display: none; }
  #refOverlay { display: none; }

  .empty-ref {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: center;
    padding: 20px;
    color: var(--dim);
  }
  .empty-ref svg { width: 48px; height: 48px; opacity: 0.5; }
  .empty-ref p { font-size: 13px; max-width: 240px; line-height: 1.4; }
  .empty-ref .row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .empty-ref button {
    background: var(--accent);
    color: #1a1410;
    border: none;
    border-radius: 999px;
    padding: 9px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .empty-ref button.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .empty-ref button.scan {
    background: var(--blue);
    color: #0e1620;
  }
  .empty-ref button:active { transform: scale(0.97); }

  .cv-splash, .index-splash {
    position: absolute;
    inset: 0;
    background: rgba(14, 13, 11, 0.85);
    backdrop-filter: blur(4px);
    z-index: 8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--dim);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    pointer-events: none;
    text-align: center;
    padding: 20px;
  }
  .cv-splash .spinner, .index-splash .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  .cv-splash.gone, .index-splash.gone {
    opacity: 0;
    transition: opacity 0.4s;
  }
  .index-splash { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .controls {
    flex: 0 0 auto;
    display: flex;
    gap: 8px;
    padding: 8px 10px 10px;
    border-top: 1px solid var(--line);
    align-items: center;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .controls::-webkit-scrollbar { display: none; }
  .ctrl {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 10px;
    padding: 8px 10px;
    min-width: 64px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .ctrl svg { width: 22px; height: 22px; }
  .ctrl.active {
    background: var(--accent);
    color: #1a1410;
    border-color: var(--accent);
  }
  .ctrl.track-active {
    background: var(--blue);
    color: #0e1620;
    border-color: var(--blue);
  }
  .ctrl:active { transform: scale(0.96); }
  .ctrl[disabled] { opacity: 0.35; pointer-events: none; }
  .ctrl.dimmed { opacity: 0.5; }
  .slider-group {
    flex: 1 1 auto;
    min-width: 100px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 4px 8px;
  }
  .slider-group label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    display: flex;
    justify-content: space-between;
  }
  .slider-group label span { color: var(--accent); }
  .slider-group input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: var(--line);
    border-radius: 2px;
    outline: none;
  }
  .slider-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }
  .slider-group input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--accent);
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 80px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20, 16, 10, 0.95);
    color: var(--ink);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13px;
    border: 1px solid var(--accent-soft);
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 50;
    max-width: 80%;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== Scan modal ===== */
  .scan-modal {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: none;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .scan-modal.open { display: flex; }
  .scan-header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
  }
  .scan-close {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink);
    font-size: 18px;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    font-family: inherit;
  }
  .scan-phase-info {
    flex: 1 1 auto;
  }
  .scan-phase-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--blue);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .scan-phase-text {
    font-size: 14px;
    color: var(--ink);
    font-style: italic;
    margin-top: 2px;
  }
  .scan-camera-wrap {
    flex: 1 1 auto;
    position: relative;
    background: #000;
    overflow: hidden;
    min-height: 0;
  }
  #scanVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #scanOverlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    z-index: 2;
  }
  .scan-stable-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 3px solid var(--blue);
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
  }
  .scan-stable-ring.show {
    opacity: 0.85;
    transform: translate(-50%, -50%) scale(1);
  }
  .scan-stable-ring.fire {
    transform: translate(-50%, -50%) scale(1.4);
    opacity: 0;
    transition: opacity 0.4s, transform 0.4s;
  }
  .scan-flash {
    position: absolute;
    inset: 0;
    background: white;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
  }
  .scan-flash.fire {
    animation: flash 0.35s ease-out;
  }
  @keyframes flash {
    0% { opacity: 0; }
    20% { opacity: 0.7; }
    100% { opacity: 0; }
  }
  .scan-frame-guide {
    position: absolute;
    inset: 8%;
    border: 2px dashed rgba(244, 234, 216, 0.25);
    border-radius: 12px;
    z-index: 3;
    pointer-events: none;
  }
  .scan-progress {
    flex: 0 0 auto;
    border-top: 1px solid var(--line);
    padding: 10px 12px 12px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .scan-preview {
    position: relative;
    width: 100px;
    height: 75px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    flex: 0 0 auto;
  }
  .scan-preview img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }
  .scan-preview img.shown { display: block; }
  .coverage-grid {
    position: absolute;
    inset: 4px;
    display: grid;
    gap: 2px;
    z-index: 2;
  }
  .coverage-cell {
    border: 1px solid rgba(244, 234, 216, 0.15);
    background: rgba(0, 0, 0, 0.2);
    border-radius: 2px;
    transition: background 0.2s, border-color 0.2s;
  }
  .coverage-cell.captured {
    background: rgba(143, 191, 108, 0.5);
    border-color: var(--green);
  }
  .scan-stats {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .scan-stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.05em;
    color: var(--dim);
  }
  .scan-stat-row .val { color: var(--ink); }
  .scan-progress-bar {
    height: 4px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
  }
  .scan-progress-bar > div {
    height: 100%;
    background: linear-gradient(to right, var(--blue), var(--green));
    width: 0;
    transition: width 0.3s;
  }
  .scan-actions {
    display: flex;
    gap: 8px;
  }
  .scan-actions button {
    flex: 1;
    background: var(--panel);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.05em;
    cursor: pointer;
  }
  .scan-actions button.primary {
    background: var(--blue);
    color: #0e1620;
    border-color: var(--blue);
    font-weight: 600;
  }
  .scan-actions button[disabled] { opacity: 0.4; }
  .scan-actions button:active:not([disabled]) { transform: scale(0.97); }

  @media (orientation: landscape) and (min-height: 400px) {
    main { flex-direction: row; }
    .panel.large, .panel.small { flex: 1 1 50%; }
  }
</style>
</head>
<body>

<header>
  <h1>Jigsaw <span>Helper</span></h1>
  <div class="status" id="status">
    <div id="cvStatus" class="warn">loading vision…</div>
    <div id="camStatus" class="warn">awaiting camera</div>
  </div>
</header>

<main>
  <div class="panel large" id="camPanel">
    <div class="panel-label">Live Camera</div>
    <button class="panel-action" id="swapBtn" style="display:none">Swap</button>
    <div id="camStage">
      <video id="camVideo" autoplay muted playsinline></video>
      <canvas id="camFrozen"></canvas>
      <canvas id="camOverlay"></canvas>
      <div class="badge-stack">
        <div class="piece-badge hidden" id="colorBadge">
          <div class="swatch-mini" id="swatchMini"></div>
          <span id="colorText">—</span>
        </div>
        <div class="piece-badge type hidden" id="typeBadge">—</div>
        <div class="piece-badge track hidden" id="trackBadge">—</div>
      </div>
      <div class="cv-splash" id="cvSplash">
        <div class="spinner"></div>
        <div>Loading vision engine</div>
      </div>
      <div class="index-splash" id="indexSplash">
        <div class="spinner"></div>
        <div id="indexText">Indexing reference image…</div>
      </div>
    </div>
  </div>

  <div class="panel small" id="refPanel">
    <div class="panel-label">Reference</div>
    <div id="refStage">
      <img id="refImg" alt="puzzle reference">
      <canvas id="refOverlay"></canvas>
      <div class="empty-ref" id="emptyRef">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="M3 15l5-5 4 4 3-3 6 6"/>
          <circle cx="9" cy="10" r="1.5" fill="currentColor"/>
        </svg>
        <p>Add the puzzle box image to begin.</p>
        <div class="row">
          <button id="uploadBtn">Upload</button>
          <button class="scan" id="scanRefBtn">Scan</button>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="controls">
  <button class="ctrl" id="trackBtn" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 3h4M3 3v4M21 3h-4M21 3v4M3 21h4M3 21v-4M21 21h-4M21 21v-4"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    Track
  </button>
  <button class="ctrl active" id="liveBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M2 12c4-7 16-7 20 0M2 12c4 7 16 7 20 0"/>
    </svg>
    Match
  </button>
  <div class="slider-group">
    <label><span>Range</span> <span id="sliderVal">40</span></label>
    <input type="range" id="slider" min="10" max="90" value="40">
  </div>
  <button class="ctrl" id="freezeBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 3v18M3 12h18M5.6 5.6l12.8 12.8M18.4 5.6L5.6 18.4"/>
    </svg>
    <span id="freezeLbl">Freeze</span>
  </button>
  <button class="ctrl" id="clearBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M5 6h14l-1 14H6L5 6zM9 6V4h6v2"/>
    </svg>
    Clear
  </button>
  <button class="ctrl" id="reScanBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 3h4M3 3v4M21 3h-4M21 3v4M3 21h4M3 21v-4M21 21h-4M21 21v-4"/>
      <path d="M8 12h8M12 8v8"/>
    </svg>
    Scan
  </button>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">
<div class="toast" id="toast"></div>

<!-- Scan modal -->
<div class="scan-modal" id="scanModal">
  <div class="scan-header">
    <button class="scan-close" id="scanClose">×</button>
    <div class="scan-phase-info">
      <div class="scan-phase-label" id="scanPhaseLabel">Step 1 of 2</div>
      <div class="scan-phase-text" id="scanPhaseText">Center the puzzle box</div>
    </div>
  </div>
  <div class="scan-camera-wrap">
    <video id="scanVideo" autoplay muted playsinline></video>
    <canvas id="scanOverlay"></canvas>
    <div class="scan-frame-guide"></div>
    <div class="scan-stable-ring" id="scanRing"></div>
    <div class="scan-flash" id="scanFlash"></div>
  </div>
  <div class="scan-progress">
    <div class="scan-preview">
      <img id="scanPreviewImg">
      <div class="coverage-grid" id="coverageGrid"></div>
    </div>
    <div class="scan-stats">
      <div class="scan-stat-row">
        <span id="scanStatusText">Hold steady</span>
        <span class="val" id="scanProgressText">0%</span>
      </div>
      <div class="scan-progress-bar"><div id="scanProgressBar"></div></div>
      <div class="scan-actions">
        <button id="scanRetakeBtn" disabled>Restart</button>
        <button class="primary" id="scanDoneBtn" disabled>Use scan</button>
      </div>
    </div>
  </div>
</div>

<script>
  var Module = {
    onRuntimeInitialized: function () {
      window.dispatchEvent(new Event('opencv-ready'));
    }
  };
</script>
<script async src="https://docs.opencv.org/4.10.0/opencv.js"
        onload="window.dispatchEvent(new Event('opencv-script-loaded'))"
        onerror="window.dispatchEvent(new Event('opencv-failed'))"></script>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const camVideo = $('camVideo'), camOverlay = $('camOverlay'), camFrozen = $('camFrozen');
  const refImg = $('refImg'), refOverlay = $('refOverlay'), refStage = $('refStage');
  const emptyRef = $('emptyRef');
  const colorBadge = $('colorBadge'), typeBadge = $('typeBadge'), trackBadge = $('trackBadge');
  const swatchMini = $('swatchMini'), colorText = $('colorText');
  const cvSplash = $('cvSplash'), indexSplash = $('indexSplash'), indexText = $('indexText');
  const cvStatus = $('cvStatus'), camStatus = $('camStatus');
  const camPanel = $('camPanel'), refPanel = $('refPanel'), swapBtn = $('swapBtn');
  const fileInput = $('fileInput');
  const uploadBtn = $('uploadBtn'), scanRefBtn = $('scanRefBtn'), reScanBtn = $('reScanBtn');
  const trackBtn = $('trackBtn'), liveBtn = $('liveBtn'), freezeBtn = $('freezeBtn');
  const freezeLbl = $('freezeLbl'), clearBtn = $('clearBtn');
  const slider = $('slider'), sliderVal = $('sliderVal');
  const toast = $('toast');
  // Scan modal elements
  const scanModal = $('scanModal'), scanClose = $('scanClose');
  const scanVideo = $('scanVideo'), scanOverlay = $('scanOverlay');
  const scanRing = $('scanRing'), scanFlash = $('scanFlash');
  const scanPhaseLabel = $('scanPhaseLabel'), scanPhaseText = $('scanPhaseText');
  const scanPreviewImg = $('scanPreviewImg'), coverageGrid = $('coverageGrid');
  const scanStatusText = $('scanStatusText'), scanProgressText = $('scanProgressText');
  const scanProgressBar = $('scanProgressBar');
  const scanRetakeBtn = $('scanRetakeBtn'), scanDoneBtn = $('scanDoneBtn');

  const state = {
    cvReady: false, cameraReady: false, refLoaded: false,
    liveMode: true, frozen: false, swapped: false,
    trackMode: false, trackReady: false, indexing: false,
    refW: 0, refH: 0, rx: 0, ry: 0, rs: 1,
    refBufImageData: null, refBufW: 0, refBufH: 0,
    refSrcImage: null,
    refMat: null, refKp: null, refDesc: null, refMatW: 0, refMatH: 0,
    lastH: null, lostFrames: 0,
    lastOverlayColor: null, lastOverlayTime: 0,
    detection: null,
    scanActive: false,
  };

  const TRACK = {
    procW: 480, refIndexW: 800,
    refFeatures: 1500, camFeatures: 800,
    pyramidLevels: 12, fastThreshold: 12,
    ratioTest: 0.78, ransacThreshold: 4.0,
    minInliersLock: 10, minInliersHold: 6,
    smoothing: 0.5,
  };

  const SCAN = {
    procW: 320,                  // CV processing resolution during scan
    stableThreshold: 30,         // mean abs diff per pixel under this = stable (loose - tolerates real hand-hold)
    stableExitThreshold: 50,     // hysteresis: must exceed this to lose stability once locked
    smoothing: 0.65,             // exponential smoothing of diff
    stableFrames: 2,             // ~300ms of stillness needed
    cooldownMs: 800,
    gridR: 4, gridC: 5,
    refFeaturesScan: 1200,
    camFeaturesScan: 700,
    ratioTest: 0.78,
    ransacThreshold: 4.0,
    minInliersScan: 12,
  };

  let toastTimer = null;
  function showToast(msg, dur = 2000) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), dur);
  }

  function vibrate(ms) {
    try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {}
  }

  function markCvReady() {
    if (state.cvReady) return;
    if (typeof cv === 'undefined' || !cv.Mat) return;
    state.cvReady = true;
    cvSplash.classList.add('gone');
    setTimeout(() => cvSplash.style.display = 'none', 400);
    cvStatus.textContent = 'vision ready';
    cvStatus.className = 'ok';
    if (state.refLoaded) trackBtn.disabled = false;
  }
  window.addEventListener('opencv-ready', markCvReady);
  window.addEventListener('opencv-script-loaded', () => {
    let tries = 0;
    const t = setInterval(() => {
      if (state.cvReady) { clearInterval(t); return; }
      if (typeof cv !== 'undefined' && cv.Mat) { clearInterval(t); markCvReady(); }
      else if (++tries > 60) clearInterval(t);
    }, 200);
  });
  window.addEventListener('opencv-failed', () => {
    cvStatus.textContent = 'vision unavailable';
    cvStatus.className = 'warn';
    cvSplash.querySelector('div:last-child').textContent = 'Vision engine failed — basic mode';
    cvSplash.querySelector('.spinner').style.display = 'none';
    setTimeout(() => {
      cvSplash.classList.add('gone');
      setTimeout(() => cvSplash.style.display = 'none', 400);
    }, 1500);
  });

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      camVideo.srcObject = stream;
      await new Promise(res => {
        if (camVideo.readyState >= 2) return res();
        camVideo.onloadedmetadata = () => res();
      });
      state.cameraReady = true;
      camStatus.textContent = 'camera ready';
      camStatus.className = 'ok';
      camOverlay.width = camVideo.videoWidth;
      camOverlay.height = camVideo.videoHeight;
      requestAnimationFrame(processLoop);
    } catch (e) {
      console.error(e);
      camStatus.textContent = 'camera blocked';
      camStatus.className = 'warn';
      showToast('Camera access denied — check permissions');
    }
  }

  function loadReferenceFromFile(file) {
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => loadReferenceFromImage(img, url);
    img.src = url;
  }

  function loadReferenceFromImage(img, url) {
    refImg.src = url || img.src;
    refImg.style.display = 'block';
    emptyRef.style.display = 'none';
    swapBtn.style.display = 'block';
    state.refW = img.naturalWidth;
    state.refH = img.naturalHeight;
    refImg.width = state.refW;
    refImg.height = state.refH;
    refOverlay.width = state.refW;
    refOverlay.height = state.refH;
    state.refSrcImage = img;
    buildRefBuffer(img);
    disposeTrackingData();
    state.refLoaded = true;
    if (state.cvReady) trackBtn.disabled = false;
    fitReferenceToStage();
  }

  const refBufCanvas = document.createElement('canvas');
  const refBufCtx = refBufCanvas.getContext('2d', { willReadFrequently: true });
  const MAX_BUF_DIM = 500;
  function buildRefBuffer(img) {
    const ratio = img.naturalWidth / img.naturalHeight;
    let bw, bh;
    if (img.naturalWidth > img.naturalHeight) {
      bw = Math.min(MAX_BUF_DIM, img.naturalWidth);
      bh = Math.round(bw / ratio);
    } else {
      bh = Math.min(MAX_BUF_DIM, img.naturalHeight);
      bw = Math.round(bh * ratio);
    }
    refBufCanvas.width = bw;
    refBufCanvas.height = bh;
    refBufCtx.drawImage(img, 0, 0, bw, bh);
    state.refBufImageData = refBufCtx.getImageData(0, 0, bw, bh);
    state.refBufW = bw;
    state.refBufH = bh;
  }

  function fitReferenceToStage() {
    const sw = refStage.clientWidth, sh = refStage.clientHeight;
    if (!sw || !sh || !state.refW) return;
    const scale = Math.min(sw / state.refW, sh / state.refH);
    state.rs = scale;
    state.rx = (sw - state.refW * scale) / 2;
    state.ry = (sh - state.refH * scale) / 2;
    applyRefTransform();
  }
  function applyRefTransform() {
    const t = `translate(${state.rx}px, ${state.ry}px) scale(${state.rs})`;
    refImg.style.transform = t;
    refOverlay.style.transform = t;
  }

  // Pinch / pan
  const pointers = new Map();
  let pinchStart = null;
  refStage.addEventListener('pointerdown', (e) => {
    if (!state.refLoaded) return;
    refStage.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 2) {
      const pts = [...pointers.values()];
      pinchStart = {
        dist: Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y),
        cx: (pts[0].x + pts[1].x) / 2,
        cy: (pts[0].y + pts[1].y) / 2,
        rs: state.rs, rx: state.rx, ry: state.ry,
      };
    }
  });
  refStage.addEventListener('pointermove', (e) => {
    if (!pointers.has(e.pointerId)) return;
    const prev = pointers.get(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 1) {
      state.rx += e.clientX - prev.x;
      state.ry += e.clientY - prev.y;
      applyRefTransform();
    } else if (pointers.size === 2 && pinchStart) {
      const pts = [...pointers.values()];
      const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
      const newScale = Math.max(0.2, Math.min(8, pinchStart.rs * (dist / pinchStart.dist)));
      const rect = refStage.getBoundingClientRect();
      const cx = pinchStart.cx - rect.left, cy = pinchStart.cy - rect.top;
      const ratio = newScale / pinchStart.rs;
      state.rs = newScale;
      state.rx = cx - (cx - pinchStart.rx) * ratio;
      state.ry = cy - (cy - pinchStart.ry) * ratio;
      applyRefTransform();
    }
  });
  function endPointer(e) {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) pinchStart = null;
  }
  refStage.addEventListener('pointerup', endPointer);
  refStage.addEventListener('pointercancel', endPointer);
  refStage.addEventListener('pointerleave', endPointer);
  refStage.addEventListener('wheel', (e) => {
    if (!state.refLoaded) return;
    e.preventDefault();
    const rect = refStage.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    const newScale = Math.max(0.2, Math.min(8, state.rs * factor));
    const ratio = newScale / state.rs;
    state.rs = newScale;
    state.rx = cx - (cx - state.rx) * ratio;
    state.ry = cy - (cy - state.ry) * ratio;
    applyRefTransform();
  }, { passive: false });
  let lastTap = 0;
  refStage.addEventListener('pointerup', () => {
    const now = Date.now();
    if (now - lastTap < 300 && state.refLoaded) fitReferenceToStage();
    lastTap = now;
  });

  // ===== Reference indexing for tracking =====
  function disposeTrackingData() {
    try { state.refMat && state.refMat.delete(); } catch(e){}
    try { state.refKp && state.refKp.delete(); } catch(e){}
    try { state.refDesc && state.refDesc.delete(); } catch(e){}
    try { state.lastH && state.lastH.delete(); } catch(e){}
    state.refMat = null;
    state.refKp = null;
    state.refDesc = null;
    state.lastH = null;
    state.trackReady = false;
    state.lostFrames = 0;
  }

  function preprocessGray(srcGray, dst) {
    try {
      const clahe = new cv.CLAHE(2.5, new cv.Size(8, 8));
      clahe.apply(srcGray, dst);
      clahe.delete();
    } catch (e) {
      srcGray.copyTo(dst);
    }
  }

  function indexReference() {
    if (!state.cvReady || !state.refSrcImage) return Promise.resolve(false);
    if (state.indexing) return Promise.resolve(false);
    state.indexing = true;
    indexText.textContent = 'Indexing reference image…';
    indexSplash.style.display = 'flex';
    indexSplash.classList.remove('gone');

    return new Promise(resolve => {
      setTimeout(() => {
        let refColor = null, gray = null, eq = null, orb = null;
        try {
          const img = state.refSrcImage;
          const targetW = TRACK.refIndexW;
          const ratio = img.naturalWidth / img.naturalHeight;
          let mw, mh;
          if (img.naturalWidth >= img.naturalHeight) {
            mw = Math.min(targetW, img.naturalWidth);
            mh = Math.round(mw / ratio);
          } else {
            mh = Math.min(targetW, img.naturalHeight);
            mw = Math.round(mh * ratio);
          }
          const c = document.createElement('canvas');
          c.width = mw; c.height = mh;
          c.getContext('2d').drawImage(img, 0, 0, mw, mh);

          refColor = cv.imread(c);
          gray = new cv.Mat();
          eq = new cv.Mat();
          cv.cvtColor(refColor, gray, cv.COLOR_RGBA2GRAY);
          preprocessGray(gray, eq);
          orb = new cv.ORB(TRACK.refFeatures, 1.2, TRACK.pyramidLevels, 31, 0, 2, cv.ORB_HARRIS_SCORE, 31, TRACK.fastThreshold);
          const kp = new cv.KeyPointVector();
          const desc = new cv.Mat();
          orb.detect(eq, kp);
          orb.compute(eq, kp, desc);

          state.refMat = refColor;
          state.refKp = kp;
          state.refDesc = desc;
          state.refMatW = mw;
          state.refMatH = mh;
          state.trackReady = true;
          refColor = null;
          showToast(`Indexed · ${kp.size()} features`);
        } catch (err) {
          console.error('Indexing error:', err);
          showToast('Indexing failed');
        } finally {
          try { gray && gray.delete(); } catch(e){}
          try { eq && eq.delete(); } catch(e){}
          try { orb && orb.delete(); } catch(e){}
          try { refColor && refColor.delete(); } catch(e){}
          state.indexing = false;
          indexSplash.classList.add('gone');
          setTimeout(() => indexSplash.style.display = 'none', 400);
          resolve(state.trackReady);
        }
      }, 50);
    });
  }

  // ===== Frame processing (main loop) =====
  const PROC_W_MATCH = 320;
  const procCanvas = document.createElement('canvas');
  const procCtx = procCanvas.getContext('2d', { willReadFrequently: true });
  let lastProcessTime = 0;

  function processLoop() {
    if (state.cameraReady && !state.scanActive) {
      const interval = state.trackMode ? 150 : 80;
      const now = performance.now();
      if (now - lastProcessTime >= interval) {
        lastProcessTime = now;
        try { processFrame(); }
        catch (err) { console.error('Frame error:', err); }
      }
    }
    requestAnimationFrame(processLoop);
  }

  function processFrame() {
    if (state.frozen) return;
    const vw = camVideo.videoWidth, vh = camVideo.videoHeight;
    if (!vw || !vh) return;
    if (state.trackMode && state.trackReady) {
      processFrameTrack(vw, vh);
    } else {
      processFrameMatch(vw, vh);
    }
  }

  // ===== MATCH MODE =====
  function processFrameMatch(vw, vh) {
    const procW = PROC_W_MATCH;
    const procH = Math.round(procW * vh / vw);
    procCanvas.width = procW;
    procCanvas.height = procH;
    procCtx.drawImage(camVideo, 0, 0, procW, procH);

    let detection = null;
    if (state.cvReady) detection = detectPiece(procCanvas);
    else detection = sampleCenterFallback(procCanvas);
    state.detection = detection;

    drawCameraOverlayMatch(detection, vw, vh, procW, procH);
    updateBadgesMatch(detection);
    trackBadge.classList.add('hidden');

    if (state.liveMode && state.refLoaded && detection && detection.color) {
      maybeUpdateRefOverlay(detection.color);
    }
  }

  function detectPiece(canvas) {
    let src = cv.imread(canvas);
    let gray = new cv.Mat(), blur = new cv.Mat(), edges = new cv.Mat(), dilated = new cv.Mat();
    let contours = new cv.MatVector(), hierarchy = new cv.Mat();
    const result = { contour: null, color: null, type: null };
    try {
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
      cv.Canny(blur, edges, 40, 120);
      const kernel = cv.Mat.ones(3, 3, cv.CV_8U);
      cv.dilate(edges, dilated, kernel);
      cv.findContours(dilated, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
      kernel.delete();
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const minArea = canvas.width * canvas.height * 0.01;
      const maxArea = canvas.width * canvas.height * 0.6;
      let best = null, bestScore = Infinity;
      for (let i = 0; i < contours.size(); i++) {
        const cnt = contours.get(i);
        const area = cv.contourArea(cnt);
        if (area < minArea || area > maxArea) { cnt.delete(); continue; }
        const rect = cv.boundingRect(cnt);
        const rcx = rect.x + rect.width / 2, rcy = rect.y + rect.height / 2;
        const score = Math.hypot(rcx - cx, rcy - cy) - Math.sqrt(area) * 0.5;
        if (score < bestScore) {
          if (best) best.delete();
          best = cnt;
          bestScore = score;
        } else { cnt.delete(); }
      }
      if (best) {
        const rect = cv.boundingRect(best);
        const pts = [];
        for (let i = 0; i < best.rows; i++) {
          pts.push({ x: best.data32S[i * 2], y: best.data32S[i * 2 + 1] });
        }
        result.contour = { rect, points: pts };
        let mask = cv.Mat.zeros(src.rows, src.cols, cv.CV_8UC1);
        let cntVec = new cv.MatVector();
        cntVec.push_back(best);
        cv.drawContours(mask, cntVec, 0, new cv.Scalar(255), -1);
        const ek = cv.Mat.ones(3, 3, cv.CV_8U);
        cv.erode(mask, mask, ek);
        ek.delete();
        const m = cv.mean(src, mask);
        result.color = { r: Math.round(m[0]), g: Math.round(m[1]), b: Math.round(m[2]) };
        mask.delete();
        cntVec.delete();
        result.type = classifyPiece(best, rect);
        best.delete();
      }
    } finally {
      src.delete(); gray.delete(); blur.delete();
      edges.delete(); dilated.delete();
      contours.delete(); hierarchy.delete();
    }
    return result;
  }

  function classifyPiece(contour, rect) {
    const tol = Math.max(4, Math.min(rect.width, rect.height) * 0.06);
    let t = 0, b = 0, l = 0, r = 0;
    const total = contour.rows;
    for (let i = 0; i < total; i++) {
      const x = contour.data32S[i * 2], y = contour.data32S[i * 2 + 1];
      if (Math.abs(y - rect.y) < tol) t++;
      if (Math.abs(y - (rect.y + rect.height)) < tol) b++;
      if (Math.abs(x - rect.x) < tol) l++;
      if (Math.abs(x - (rect.x + rect.width)) < tol) r++;
    }
    const minX = rect.width * 0.18, minY = rect.height * 0.18;
    let flat = 0;
    if (t > minX) flat++;
    if (b > minX) flat++;
    if (l > minY) flat++;
    if (r > minY) flat++;
    if (flat >= 2) return 'corner';
    if (flat === 1) return 'edge';
    return 'middle';
  }

  function sampleCenterFallback(canvas) {
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const half = 12;
    const data = ctx.getImageData(cx - half, cy - half, half * 2, half * 2).data;
    let r = 0, g = 0, b = 0, n = 0;
    for (let i = 0; i < data.length; i += 4) {
      r += data[i]; g += data[i + 1]; b += data[i + 2]; n++;
    }
    return {
      contour: null,
      color: { r: Math.round(r / n), g: Math.round(g / n), b: Math.round(b / n) },
      type: null,
    };
  }

  function drawCameraOverlayMatch(detection, vw, vh, procW, procH) {
    if (camOverlay.width !== vw) camOverlay.width = vw;
    if (camOverlay.height !== vh) camOverlay.height = vh;
    const ctx = camOverlay.getContext('2d');
    ctx.clearRect(0, 0, vw, vh);
    ctx.strokeStyle = 'rgba(232, 160, 74, 0.85)';
    ctx.lineWidth = Math.max(1.5, vw * 0.0015);
    ctx.fillStyle = 'rgba(232, 160, 74, 0.15)';
    const cx = vw / 2, cy = vh / 2;
    const r = Math.min(vw, vh) * 0.025;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - r * 2.5, cy); ctx.lineTo(cx - r * 1.2, cy);
    ctx.moveTo(cx + r * 1.2, cy); ctx.lineTo(cx + r * 2.5, cy);
    ctx.moveTo(cx, cy - r * 2.5); ctx.lineTo(cx, cy - r * 1.2);
    ctx.moveTo(cx, cy + r * 1.2); ctx.lineTo(cx, cy + r * 2.5);
    ctx.stroke();
    if (detection && detection.contour) {
      const { points } = detection.contour;
      const sx = vw / procW, sy = vh / procH;
      ctx.fillStyle = 'rgba(232, 160, 74, 0.12)';
      ctx.strokeStyle = 'rgba(232, 160, 74, 0.95)';
      ctx.lineWidth = Math.max(2, vw * 0.0025);
      ctx.beginPath();
      for (let i = 0; i < points.length; i++) {
        const px = points[i].x * sx, py = points[i].y * sy;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
  }

  function updateBadgesMatch(detection) {
    if (detection && detection.color) {
      const { r, g, b } = detection.color;
      swatchMini.style.background = `rgb(${r},${g},${b})`;
      colorText.textContent = `rgb ${r} ${g} ${b}`;
      colorBadge.classList.remove('hidden');
    } else {
      colorBadge.classList.add('hidden');
    }
    if (detection && detection.type) {
      const labels = { corner: '◢ corner', edge: '▭ edge', middle: '✦ middle' };
      typeBadge.textContent = labels[detection.type];
      typeBadge.classList.remove('hidden');
    } else {
      typeBadge.classList.add('hidden');
    }
  }

  function maybeUpdateRefOverlay(color) {
    const now = performance.now();
    const last = state.lastOverlayColor;
    let changed = !last;
    if (last) {
      const d = Math.hypot(color.r - last.r, color.g - last.g, color.b - last.b);
      changed = d > 12;
    }
    if (changed && now - state.lastOverlayTime > 600) {
      state.lastOverlayColor = color;
      state.lastOverlayTime = now;
      drawRefOverlay(color);
    }
  }

  function drawRefOverlay(color) {
    if (!state.refBufImageData) return;
    const tol = parseInt(slider.value, 10);
    const tolSq = tol * tol * 3;
    const { r: tr, g: tg, b: tb } = color;
    const buf = state.refBufImageData;
    const bw = state.refBufW, bh = state.refBufH;
    const out = refBufCtx.createImageData(bw, bh);
    const src = buf.data, dst = out.data;
    for (let i = 0; i < src.length; i += 4) {
      const dr = src[i] - tr, dg = src[i + 1] - tg, db = src[i + 2] - tb;
      if (dr * dr + dg * dg + db * db <= tolSq) {
        dst[i + 3] = 0;
      } else {
        dst[i] = 8; dst[i + 1] = 7; dst[i + 2] = 5;
        dst[i + 3] = 175;
      }
    }
    refBufCtx.putImageData(out, 0, 0);
    refOverlay.width = state.refW;
    refOverlay.height = state.refH;
    const ctx = refOverlay.getContext('2d');
    ctx.clearRect(0, 0, state.refW, state.refH);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(refBufCanvas, 0, 0, state.refW, state.refH);
    refOverlay.style.display = 'block';
  }
  function clearRefOverlay() {
    refOverlay.style.display = 'none';
    state.lastOverlayColor = null;
  }

  // ===== TRACK MODE =====
  function processFrameTrack(vw, vh) {
    const procW = TRACK.procW;
    const procH = Math.round(procW * vh / vw);
    procCanvas.width = procW;
    procCanvas.height = procH;
    procCtx.drawImage(camVideo, 0, 0, procW, procH);

    let src = null, gray = null, eq = null, kp = null, desc = null, orb = null;
    let bf = null, knn = null, srcMat = null, dstMat = null, mask = null, H = null;
    let goodMatches = 0, inliers = 0, homography = null;

    try {
      src = cv.imread(procCanvas);
      gray = new cv.Mat();
      eq = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      preprocessGray(gray, eq);

      orb = new cv.ORB(TRACK.camFeatures, 1.2, TRACK.pyramidLevels, 31, 0, 2, cv.ORB_HARRIS_SCORE, 31, TRACK.fastThreshold);
      kp = new cv.KeyPointVector();
      desc = new cv.Mat();
      orb.detect(eq, kp);
      orb.compute(eq, kp, desc);

      if (desc.rows >= 8 && state.refDesc && state.refDesc.rows >= 8) {
        bf = new cv.BFMatcher(cv.NORM_HAMMING, false);
        knn = new cv.DMatchVectorVector();
        bf.knnMatch(state.refDesc, desc, knn, 2);
        const goodSrc = [], goodDst = [];
        for (let i = 0; i < knn.size(); i++) {
          const v = knn.get(i);
          if (v.size() < 2) continue;
          const m = v.get(0), n = v.get(1);
          if (m.distance < TRACK.ratioTest * n.distance) {
            const rk = state.refKp.get(m.queryIdx);
            const ck = kp.get(m.trainIdx);
            goodSrc.push(rk.pt.x, rk.pt.y);
            goodDst.push(ck.pt.x, ck.pt.y);
          }
        }
        goodMatches = goodSrc.length / 2;
        if (goodMatches >= 6) {
          srcMat = cv.matFromArray(goodMatches, 1, cv.CV_32FC2, goodSrc);
          dstMat = cv.matFromArray(goodMatches, 1, cv.CV_32FC2, goodDst);
          mask = new cv.Mat();
          H = cv.findHomography(srcMat, dstMat, cv.RANSAC, TRACK.ransacThreshold, mask);
          if (H && !H.empty()) {
            for (let i = 0; i < mask.rows; i++) if (mask.data[i]) inliers++;
            const hadLock = !!state.lastH;
            const minInliers = hadLock ? TRACK.minInliersHold : TRACK.minInliersLock;
            const corners = projectCorners(H, state.refMatW, state.refMatH);
            if (inliers >= minInliers && corners && isReasonableHomography(corners, procW, procH)) {
              homography = H;
            }
          }
        }
      }
    } catch (err) {
      console.error('Track frame error:', err);
    }

    if (homography) {
      state.lostFrames = 0;
      if (state.lastH && !state.lastH.empty()) {
        const blended = new cv.Mat();
        const a = TRACK.smoothing;
        cv.addWeighted(state.lastH, a, homography, 1 - a, 0, blended);
        state.lastH.delete();
        state.lastH = blended;
      } else {
        state.lastH = homography.clone();
      }
      drawARTrackOverlay(state.lastH, vw, vh, procW, procH);
      updateTrackBadge('locked', inliers, goodMatches);
    } else {
      state.lostFrames++;
      if (state.lostFrames > 3 && state.lastH) {
        try { state.lastH.delete(); } catch(e){}
        state.lastH = null;
      }
      if (state.lastH) {
        drawARTrackOverlay(state.lastH, vw, vh, procW, procH);
        updateTrackBadge('searching', inliers, goodMatches);
      } else {
        clearCamOverlay(vw, vh);
        drawCrosshair(vw, vh);
        clearRefOverlay();
        refOverlay.style.display = 'none';
        updateTrackBadge('lost', inliers, goodMatches);
      }
    }
    try { src && src.delete(); } catch(e){}
    try { gray && gray.delete(); } catch(e){}
    try { eq && eq.delete(); } catch(e){}
    try { kp && kp.delete(); } catch(e){}
    try { desc && desc.delete(); } catch(e){}
    try { orb && orb.delete(); } catch(e){}
    try { bf && bf.delete(); } catch(e){}
    try { knn && knn.delete(); } catch(e){}
    try { srcMat && srcMat.delete(); } catch(e){}
    try { dstMat && dstMat.delete(); } catch(e){}
    try { mask && mask.delete(); } catch(e){}
    if (homography && homography !== state.lastH) {
      try { homography.delete(); } catch(e){}
    }
    colorBadge.classList.add('hidden');
    typeBadge.classList.add('hidden');
  }

  function isReasonableHomography(corners, vw, vh) {
    const cross = (a, b, c) => (b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x);
    let prevSign = 0;
    for (let i = 0; i < 4; i++) {
      const s = cross(corners[i], corners[(i+1)%4], corners[(i+2)%4]);
      const sign = s > 0 ? 1 : -1;
      if (i === 0) prevSign = sign;
      else if (sign !== prevSign) return false;
    }
    let area = 0;
    for (let i = 0; i < 4; i++) {
      const j = (i+1) % 4;
      area += corners[i].x * corners[j].y - corners[j].x * corners[i].y;
    }
    area = Math.abs(area) / 2;
    const frameArea = vw * vh;
    if (area < frameArea * 0.02 || area > frameArea * 30) return false;
    const lens = [];
    for (let i = 0; i < 4; i++) {
      const j = (i+1) % 4;
      lens.push(Math.hypot(corners[j].x - corners[i].x, corners[j].y - corners[i].y));
    }
    const maxLen = Math.max(...lens);
    const minLen = Math.min(...lens);
    if (minLen < maxLen * 0.1) return false;
    return true;
  }

  function clearCamOverlay(vw, vh) {
    if (camOverlay.width !== vw) camOverlay.width = vw;
    if (camOverlay.height !== vh) camOverlay.height = vh;
    camOverlay.getContext('2d').clearRect(0, 0, vw, vh);
  }
  function drawCrosshair(vw, vh) {
    const ctx = camOverlay.getContext('2d');
    ctx.strokeStyle = 'rgba(108, 174, 232, 0.7)';
    ctx.lineWidth = Math.max(1.5, vw * 0.0015);
    const cx = vw / 2, cy = vh / 2;
    const r = Math.min(vw, vh) * 0.02;
    ctx.beginPath();
    ctx.moveTo(cx - r, cy); ctx.lineTo(cx + r, cy);
    ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy + r);
    ctx.stroke();
  }

  function drawARTrackOverlay(H, vw, vh, procW, procH) {
    if (!state.refMat) return;
    if (camOverlay.width !== vw) camOverlay.width = vw;
    if (camOverlay.height !== vh) camOverlay.height = vh;
    const sx = vw / procW, sy = vh / procH;
    const scaleData = [sx, 0, 0,  0, sy, 0,  0, 0, 1];
    const S = cv.matFromArray(3, 3, cv.CV_64F, scaleData);
    const Hscaled = new cv.Mat();
    const empty = new cv.Mat();
    cv.gemm(S, H, 1.0, empty, 0, Hscaled);
    S.delete(); empty.delete();
    const warped = new cv.Mat();
    const dsize = new cv.Size(vw, vh);
    cv.warpPerspective(state.refMat, warped, Hscaled, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar(0,0,0,0));
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = vw; tmpCanvas.height = vh;
    cv.imshow(tmpCanvas, warped);
    const ctx = camOverlay.getContext('2d');
    ctx.clearRect(0, 0, vw, vh);
    ctx.globalAlpha = 0.5;
    ctx.drawImage(tmpCanvas, 0, 0);
    ctx.globalAlpha = 1.0;
    const corners = projectCorners(Hscaled, state.refMatW, state.refMatH);
    if (corners) {
      ctx.strokeStyle = 'rgba(108, 174, 232, 0.95)';
      ctx.lineWidth = Math.max(2, vw * 0.003);
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        if (i === 0) ctx.moveTo(corners[i].x, corners[i].y);
        else ctx.lineTo(corners[i].x, corners[i].y);
      }
      ctx.closePath();
      ctx.stroke();
    }
    Hscaled.delete();
    warped.delete();
    drawRefRegionHighlight(H, procW, procH);
  }

  function projectCorners(H, w, h) {
    const data = H.data64F;
    const apply = (x, y) => {
      const dx = data[0]*x + data[1]*y + data[2];
      const dy = data[3]*x + data[4]*y + data[5];
      const dz = data[6]*x + data[7]*y + data[8];
      if (Math.abs(dz) < 1e-9) return null;
      return { x: dx/dz, y: dy/dz };
    };
    const c = [apply(0,0), apply(w,0), apply(w,h), apply(0,h)];
    if (c.some(p => !p)) return null;
    return c;
  }

  function drawRefRegionHighlight(H, procW, procH) {
    const Hinv = new cv.Mat();
    try {
      cv.invert(H, Hinv);
      const data = Hinv.data64F;
      const apply = (x, y) => {
        const dx = data[0]*x + data[1]*y + data[2];
        const dy = data[3]*x + data[4]*y + data[5];
        const dz = data[6]*x + data[7]*y + data[8];
        return { x: dx/dz, y: dy/dz };
      };
      const camCorners = [apply(0,0), apply(procW,0), apply(procW,procH), apply(0,procH)];
      const mx = state.refW / state.refMatW;
      const my = state.refH / state.refMatH;
      refOverlay.width = state.refW;
      refOverlay.height = state.refH;
      const rctx = refOverlay.getContext('2d');
      rctx.clearRect(0, 0, state.refW, state.refH);
      rctx.fillStyle = 'rgba(8, 7, 5, 0.55)';
      rctx.fillRect(0, 0, state.refW, state.refH);
      rctx.globalCompositeOperation = 'destination-out';
      rctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const c = camCorners[i];
        if (i === 0) rctx.moveTo(c.x * mx, c.y * my);
        else rctx.lineTo(c.x * mx, c.y * my);
      }
      rctx.closePath();
      rctx.fill();
      rctx.globalCompositeOperation = 'source-over';
      rctx.strokeStyle = 'rgba(108, 174, 232, 0.95)';
      rctx.lineWidth = Math.max(2, state.refW * 0.005);
      rctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const c = camCorners[i];
        if (i === 0) rctx.moveTo(c.x * mx, c.y * my);
        else rctx.lineTo(c.x * mx, c.y * my);
      }
      rctx.closePath();
      rctx.stroke();
      refOverlay.style.display = 'block';
    } catch (err) {} finally { Hinv.delete(); }
  }

  function updateTrackBadge(status, inliers, matches) {
    trackBadge.classList.remove('hidden', 'lost', 'weak');
    if (status === 'locked') {
      trackBadge.textContent = `◉ tracking · ${inliers} pts`;
      if (inliers < 15) trackBadge.classList.add('weak');
    } else if (status === 'searching') {
      trackBadge.textContent = `◌ holding · ${matches} match`;
      trackBadge.classList.add('weak');
    } else {
      if (matches > 0) {
        trackBadge.textContent = `✕ weak · ${matches} matches, ${inliers} inliers`;
      } else {
        trackBadge.textContent = '✕ no matches';
      }
      trackBadge.classList.add('lost');
    }
  }

  // ============================================================
  // ===== SCAN MODE (guided multi-photo capture + stitching) ====
  // ============================================================
  const scanState = {
    phase: 'base', // 'base' | 'detail' | 'done'
    baseCanvas: null,
    enhancedCanvas: null,
    baseW: 0, baseH: 0,
    baseKp: null, baseDesc: null,
    coverage: null,    // 2D bool array [r][c]
    stableFrames: 0,
    smoothedDiff: 100, // exponentially smoothed motion measure
    isStable: false,   // hysteretic stability state
    lastSmallData: null,
    lastCaptureTime: 0,
    capturedTiles: 0,
  };

  // Build coverage grid DOM
  function buildCoverageGrid() {
    coverageGrid.innerHTML = '';
    coverageGrid.style.gridTemplateRows = `repeat(${SCAN.gridR}, 1fr)`;
    coverageGrid.style.gridTemplateColumns = `repeat(${SCAN.gridC}, 1fr)`;
    scanState.coverage = [];
    for (let r = 0; r < SCAN.gridR; r++) {
      const row = [];
      for (let c = 0; c < SCAN.gridC; c++) {
        row.push(false);
        const cell = document.createElement('div');
        cell.className = 'coverage-cell';
        cell.dataset.r = r;
        cell.dataset.c = c;
        coverageGrid.appendChild(cell);
      }
      scanState.coverage.push(row);
    }
  }

  function setCoverage(r, c, captured) {
    if (r < 0 || r >= SCAN.gridR || c < 0 || c >= SCAN.gridC) return false;
    if (scanState.coverage[r][c] === captured) return false;
    scanState.coverage[r][c] = captured;
    const idx = r * SCAN.gridC + c;
    const cellEl = coverageGrid.children[idx];
    if (cellEl) cellEl.classList.toggle('captured', captured);
    return true;
  }

  function coverageCount() {
    let n = 0;
    for (let r = 0; r < SCAN.gridR; r++)
      for (let c = 0; c < SCAN.gridC; c++)
        if (scanState.coverage[r][c]) n++;
    return n;
  }

  function updateScanProgress() {
    const total = SCAN.gridR * SCAN.gridC;
    const done = coverageCount();
    const pct = Math.round(100 * done / total);
    scanProgressText.textContent = pct + '%';
    scanProgressBar.style.width = pct + '%';
    scanDoneBtn.disabled = scanState.phase === 'base';
  }

  function openScanModal() {
    if (!state.cameraReady) {
      showToast('Camera not ready');
      return;
    }
    if (!state.cvReady) {
      showToast('Vision still loading');
      return;
    }
    scanModal.classList.add('open');
    state.scanActive = true;
    scanVideo.srcObject = camVideo.srcObject;
    initScanState();
    requestAnimationFrame(scanLoop);
  }

  function closeScanModal() {
    scanModal.classList.remove('open');
    state.scanActive = false;
    cleanupScanState();
  }

  function initScanState() {
    cleanupScanState();
    scanState.phase = 'base';
    scanState.stableFrames = 0;
    scanState.smoothedDiff = 100;
    scanState.isStable = false;
    scanState.lastSmallData = null;
    scanState.lastCaptureTime = 0;
    scanState.capturedTiles = 0;
    scanPhaseLabel.textContent = 'Step 1 of 2';
    scanPhaseText.textContent = 'Center the puzzle box and hold steady';
    scanStatusText.textContent = 'Hold steady for 1 sec';
    scanProgressText.textContent = '0%';
    scanProgressBar.style.width = '0%';
    scanPreviewImg.classList.remove('shown');
    scanPreviewImg.src = '';
    buildCoverageGrid();
    scanDoneBtn.disabled = true;
    scanRetakeBtn.disabled = true;
    scanRing.classList.remove('show', 'fire');
  }

  function cleanupScanState() {
    if (scanState.baseKp) { try { scanState.baseKp.delete(); } catch(e){} scanState.baseKp = null; }
    if (scanState.baseDesc) { try { scanState.baseDesc.delete(); } catch(e){} scanState.baseDesc = null; }
    scanState.baseCanvas = null;
    scanState.enhancedCanvas = null;
    scanState.coverage = null;
  }

  // Stability detection: compute mean abs diff between this small frame and last
  const stabCanvas = document.createElement('canvas');
  const stabCtx = stabCanvas.getContext('2d', { willReadFrequently: true });
  const STAB_W = 64;

  function getSmallFrame() {
    if (!scanVideo.videoWidth) return null;
    const h = Math.round(STAB_W * scanVideo.videoHeight / scanVideo.videoWidth);
    stabCanvas.width = STAB_W; stabCanvas.height = h;
    stabCtx.drawImage(scanVideo, 0, 0, STAB_W, h);
    return stabCtx.getImageData(0, 0, STAB_W, h);
  }

  function frameDiff(a, b) {
    if (!a || !b) return Infinity;
    if (a.data.length !== b.data.length) return Infinity;
    let sum = 0;
    const len = a.data.length;
    for (let i = 0; i < len; i += 4) {
      const dr = a.data[i] - b.data[i];
      const dg = a.data[i+1] - b.data[i+1];
      const db = a.data[i+2] - b.data[i+2];
      sum += Math.abs(dr) + Math.abs(dg) + Math.abs(db);
    }
    return sum / (len / 4 * 3);
  }

  let scanLastTime = 0;
  function scanLoop() {
    if (!state.scanActive) return;
    const interval = scanState.phase === 'base' ? 100 : 180;
    const now = performance.now();
    if (now - scanLastTime >= interval) {
      scanLastTime = now;
      try {
        if (scanState.phase === 'base') scanFrameBase();
        else if (scanState.phase === 'detail') scanFrameDetail();
      } catch (err) {
        console.error('Scan frame error:', err);
      }
    }
    requestAnimationFrame(scanLoop);
  }

  // Phase 1: capture base when camera is steady
  function scanFrameBase() {
    const small = getSmallFrame();
    const rawDiff = frameDiff(scanState.lastSmallData, small);
    scanState.lastSmallData = small;

    // Exponential moving average — single noisy frames don't reset the counter
    if (rawDiff !== Infinity) {
      scanState.smoothedDiff = SCAN.smoothing * scanState.smoothedDiff + (1 - SCAN.smoothing) * rawDiff;
    }

    // Hysteresis: easier to gain stability than to lose it
    if (!scanState.isStable && scanState.smoothedDiff < SCAN.stableThreshold) {
      scanState.isStable = true;
    } else if (scanState.isStable && scanState.smoothedDiff > SCAN.stableExitThreshold) {
      scanState.isStable = false;
    }

    if (scanState.isStable) {
      scanState.stableFrames++;
      const need = SCAN.stableFrames;
      const ratio = Math.min(1, scanState.stableFrames / need);
      scanRing.classList.add('show');
      scanRing.style.borderColor = `rgba(108, 174, 232, ${0.3 + ratio * 0.6})`;
      scanRing.style.transform = `translate(-50%, -50%) scale(${0.6 + ratio * 0.4})`;
      scanStatusText.textContent = ratio < 1 ? 'Hold still…' : 'Capturing…';
      if (scanState.stableFrames >= need) {
        // Reset stability state IMMEDIATELY so even if capture fails, we don't loop on "Capturing..."
        scanState.stableFrames = 0;
        scanState.isStable = false;
        captureBase();
      }
    } else {
      // Decay slowly instead of resetting — small bumps don't undo all progress
      scanState.stableFrames = Math.max(0, scanState.stableFrames - 1);
      if (scanState.stableFrames === 0) {
        scanRing.classList.remove('show');
      }
      scanStatusText.textContent = 'Hold steady';
    }
  }

  function fireFlash() {
    scanFlash.classList.remove('fire');
    void scanFlash.offsetWidth;
    scanFlash.classList.add('fire');
    vibrate(40);
  }

  function captureBase() {
    if (!scanVideo.videoWidth) {
      console.warn('captureBase: video not ready');
      return false;
    }
    const vw = scanVideo.videoWidth, vh = scanVideo.videoHeight;

    // Capture the photo first - this part can't really fail
    const c = document.createElement('canvas');
    c.width = vw; c.height = vh;
    c.getContext('2d').drawImage(scanVideo, 0, 0);

    scanState.baseCanvas = c;
    scanState.baseW = vw;
    scanState.baseH = vh;

    const eC = document.createElement('canvas');
    eC.width = vw; eC.height = vh;
    eC.getContext('2d').drawImage(c, 0, 0);
    scanState.enhancedCanvas = eC;

    // Update preview + visual feedback BEFORE any CV that could fail
    scanPreviewImg.src = c.toDataURL('image/jpeg', 0.8);
    scanPreviewImg.classList.add('shown');
    fireFlash();
    scanRing.classList.add('fire');

    // Transition phase IMMEDIATELY - so we never get stuck retrying
    scanState.phase = 'detail';
    scanState.stableFrames = 0;
    scanState.isStable = false;
    scanState.smoothedDiff = 100;
    scanState.lastSmallData = null;
    scanState.lastCaptureTime = performance.now();
    scanPhaseLabel.textContent = 'Step 2 of 2';
    scanPhaseText.textContent = 'Move camera over different areas to add detail';
    scanStatusText.textContent = 'Hover over each area';
    scanRetakeBtn.disabled = false;
    scanDoneBtn.disabled = false;

    // Now extract features. If this fails, user still has the base photo —
    // detail phase just won't be able to register frames against it.
    // We downscale to keep CV operations fast and avoid memory issues with 1080p+ frames.
    let mat = null, gray = null, eq = null, orb = null, downCanvas = null;
    try {
      const maxDim = 960;
      let dw = vw, dh = vh;
      if (Math.max(vw, vh) > maxDim) {
        const s = maxDim / Math.max(vw, vh);
        dw = Math.round(vw * s);
        dh = Math.round(vh * s);
      }
      downCanvas = document.createElement('canvas');
      downCanvas.width = dw; downCanvas.height = dh;
      downCanvas.getContext('2d').drawImage(c, 0, 0, dw, dh);

      mat = cv.imread(downCanvas);
      gray = new cv.Mat();
      eq = new cv.Mat();
      cv.cvtColor(mat, gray, cv.COLOR_RGBA2GRAY);
      preprocessGray(gray, eq);
      // Simpler 1-arg ORB constructor for max compatibility
      orb = new cv.ORB(SCAN.refFeaturesScan);
      const kp = new cv.KeyPointVector();
      const desc = new cv.Mat();
      orb.detect(eq, kp);
      orb.compute(eq, kp, desc);
      // Keypoints are in downscaled coords - need to scale them up to base coords
      // when we use them in stitching. We'll store the scale factor.
      scanState.baseKp = kp;
      scanState.baseDesc = desc;
      scanState.baseFeatScale = vw / dw; // multiply kp coords by this for base-coord
      console.log('Base captured + indexed:', kp.size(), 'features at', dw + 'x' + dh);
    } catch (err) {
      console.error('Base feature extraction failed:', err);
      showToast('Indexing failed — detail mode disabled. Try Restart.');
      scanState.baseKp = null;
      scanState.baseDesc = null;
    } finally {
      try { mat && mat.delete(); } catch(e){}
      try { gray && gray.delete(); } catch(e){}
      try { eq && eq.delete(); } catch(e){}
      try { orb && orb.delete(); } catch(e){}
    }
    return true;
  }

  // Phase 2: per-frame match against base, auto-stitch when steady + new region
  function scanFrameDetail() {
    if (!scanVideo.videoWidth) return;
    const small = getSmallFrame();
    const rawDiff = frameDiff(scanState.lastSmallData, small);
    scanState.lastSmallData = small;
    if (rawDiff !== Infinity) {
      scanState.smoothedDiff = SCAN.smoothing * scanState.smoothedDiff + (1 - SCAN.smoothing) * rawDiff;
    }
    // Phase 2 is more permissive — you're moving the camera deliberately
    const enterT = SCAN.stableThreshold * 1.5;
    const exitT = SCAN.stableExitThreshold * 1.5;
    if (!scanState.isStable && scanState.smoothedDiff < enterT) scanState.isStable = true;
    else if (scanState.isStable && scanState.smoothedDiff > exitT) scanState.isStable = false;

    if (!scanState.isStable) {
      scanState.stableFrames = Math.max(0, scanState.stableFrames - 1);
      if (scanState.stableFrames === 0) scanRing.classList.remove('show');
      scanStatusText.textContent = 'Move slower';
      return;
    }
    scanState.stableFrames++;
    if (scanState.stableFrames < 2) {
      scanStatusText.textContent = 'Hold still…';
      return;
    }
    const now = performance.now();
    if (now - scanState.lastCaptureTime < SCAN.cooldownMs) {
      scanStatusText.textContent = 'Captured · move on';
      return;
    }

    // Try to register frame to base
    const procH = Math.round(SCAN.procW * scanVideo.videoHeight / scanVideo.videoWidth);
    procCanvas.width = SCAN.procW;
    procCanvas.height = procH;
    procCtx.drawImage(scanVideo, 0, 0, SCAN.procW, procH);

    let src = null, gray = null, eq = null, orb = null, kp = null, desc = null;
    let bf = null, knn = null, srcMat = null, dstMat = null, mask = null, H = null;
    let homography = null, inliers = 0;

    try {
      src = cv.imread(procCanvas);
      gray = new cv.Mat();
      eq = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      preprocessGray(gray, eq);
      orb = new cv.ORB(SCAN.camFeaturesScan, 1.2, 12, 31, 0, 2, cv.ORB_HARRIS_SCORE, 31, TRACK.fastThreshold);
      kp = new cv.KeyPointVector();
      desc = new cv.Mat();
      orb.detect(eq, kp);
      orb.compute(eq, kp, desc);

      if (desc.rows >= 8 && scanState.baseDesc && scanState.baseDesc.rows >= 8) {
        bf = new cv.BFMatcher(cv.NORM_HAMMING, false);
        knn = new cv.DMatchVectorVector();
        // base = query, frame = train: we want H mapping base coords to frame coords...
        // Actually, we want frame -> base. So set frame as query.
        bf.knnMatch(desc, scanState.baseDesc, knn, 2);
        const goodSrc = [], goodDst = [];
        const baseScale = scanState.baseFeatScale || 1;
        for (let i = 0; i < knn.size(); i++) {
          const v = knn.get(i);
          if (v.size() < 2) continue;
          const m = v.get(0), n = v.get(1);
          if (m.distance < SCAN.ratioTest * n.distance) {
            const fk = kp.get(m.queryIdx);
            const bk = scanState.baseKp.get(m.trainIdx);
            // src = frame coords (proc-res), dst = base coords (full res after scaling)
            goodSrc.push(fk.pt.x, fk.pt.y);
            goodDst.push(bk.pt.x * baseScale, bk.pt.y * baseScale);
          }
        }
        const goodN = goodSrc.length / 2;
        if (goodN >= SCAN.minInliersScan) {
          srcMat = cv.matFromArray(goodN, 1, cv.CV_32FC2, goodSrc);
          dstMat = cv.matFromArray(goodN, 1, cv.CV_32FC2, goodDst);
          mask = new cv.Mat();
          H = cv.findHomography(srcMat, dstMat, cv.RANSAC, SCAN.ransacThreshold, mask);
          if (H && !H.empty()) {
            for (let i = 0; i < mask.rows; i++) if (mask.data[i]) inliers++;
            const corners = projectCorners(H, SCAN.procW, procH);
            if (inliers >= SCAN.minInliersScan && corners) {
              homography = H;
            }
          }
        }
      }
    } catch (err) {
      console.error('Scan detail error:', err);
    }

    if (homography) {
      // Determine which grid cells the projected frame quad covers (in base coords)
      const baseCorners = projectCorners(homography, SCAN.procW, procH);
      let newCells = 0;
      if (baseCorners) {
        const cellW = scanState.baseW / SCAN.gridC;
        const cellH = scanState.baseH / SCAN.gridR;
        // Get bounding box of quad
        const xs = baseCorners.map(p => p.x);
        const ys = baseCorners.map(p => p.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        // For each cell in the bbox, check if cell center is inside the quad
        const c0 = Math.max(0, Math.floor(minX / cellW));
        const c1 = Math.min(SCAN.gridC - 1, Math.floor(maxX / cellW));
        const r0 = Math.max(0, Math.floor(minY / cellH));
        const r1 = Math.min(SCAN.gridR - 1, Math.floor(maxY / cellH));
        for (let r = r0; r <= r1; r++) {
          for (let c = c0; c <= c1; c++) {
            const cx = (c + 0.5) * cellW;
            const cy = (r + 0.5) * cellH;
            if (pointInQuad({x: cx, y: cy}, baseCorners)) {
              if (setCoverage(r, c, true)) newCells++;
            }
          }
        }
      }

      if (newCells > 0) {
        // Stitch: warp the full-resolution frame into base coords and composite
        stitchFrame(homography, SCAN.procW, procH);
        scanState.capturedTiles++;
        scanState.lastCaptureTime = now;
        fireFlash();
        scanRing.classList.remove('show');
        setTimeout(() => {
          scanRing.classList.add('show', 'fire');
          setTimeout(() => scanRing.classList.remove('show', 'fire'), 350);
        }, 0);
        updateScanProgress();
        const total = SCAN.gridR * SCAN.gridC;
        const done = coverageCount();
        scanStatusText.textContent = `+${newCells} · ${done}/${total} cells`;
        // Auto-finish at 100%
        if (done >= total) {
          setTimeout(finalizeScan, 600);
        }
      } else {
        scanStatusText.textContent = 'Already covered · try elsewhere';
      }
    } else {
      scanStatusText.textContent = inliers > 0 ? `searching · ${inliers} pts` : 'searching…';
    }

    try { src && src.delete(); } catch(e){}
    try { gray && gray.delete(); } catch(e){}
    try { eq && eq.delete(); } catch(e){}
    try { orb && orb.delete(); } catch(e){}
    try { kp && kp.delete(); } catch(e){}
    try { desc && desc.delete(); } catch(e){}
    try { bf && bf.delete(); } catch(e){}
    try { knn && knn.delete(); } catch(e){}
    try { srcMat && srcMat.delete(); } catch(e){}
    try { dstMat && dstMat.delete(); } catch(e){}
    try { mask && mask.delete(); } catch(e){}
    try { H && H.delete(); } catch(e){}
  }

  function pointInQuad(p, q) {
    // q is array of 4 points in order
    let inside = false;
    for (let i = 0, j = 3; i < 4; j = i++) {
      const xi = q[i].x, yi = q[i].y;
      const xj = q[j].x, yj = q[j].y;
      if (((yi > p.y) !== (yj > p.y)) &&
          (p.x < (xj - xi) * (p.y - yi) / (yj - yi) + xi)) {
        inside = !inside;
      }
    }
    return inside;
  }

  // Warp current camera frame into base coords and composite into enhancedCanvas
  function stitchFrame(H_proc, procW, procH) {
    // H_proc maps proc-frame coords -> base coords.
    // We want to take the full-resolution frame and warp it into base coords.
    // Need to scale H_proc to operate on the full-resolution frame.
    const fullW = scanVideo.videoWidth;
    const fullH = scanVideo.videoHeight;

    // Capture full-res frame
    const fullCanvas = document.createElement('canvas');
    fullCanvas.width = fullW; fullCanvas.height = fullH;
    fullCanvas.getContext('2d').drawImage(scanVideo, 0, 0);

    let frameMat = null, scaledH = null, warped = null;
    try {
      frameMat = cv.imread(fullCanvas);
      // Scale H_proc to operate on full-res input:
      // For input point in full-res space, divide by full/proc scale to get proc coord, then apply H_proc.
      const sx = procW / fullW, sy = procH / fullH;
      const Hdata = H_proc.data64F;
      // Build H' = H_proc * S where S maps full -> proc
      const Sdata = [sx, 0, 0,  0, sy, 0,  0, 0, 1];
      const S = cv.matFromArray(3, 3, cv.CV_64F, Sdata);
      scaledH = new cv.Mat();
      const empty = new cv.Mat();
      cv.gemm(H_proc, S, 1.0, empty, 0, scaledH);
      S.delete(); empty.delete();

      warped = new cv.Mat();
      const dsize = new cv.Size(scanState.baseW, scanState.baseH);
      cv.warpPerspective(frameMat, warped, scaledH, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar(0,0,0,0));

      // Composite onto enhancedCanvas (warped pixels overwrite, transparent borders preserve existing)
      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = scanState.baseW;
      tmpCanvas.height = scanState.baseH;
      cv.imshow(tmpCanvas, warped);
      const ctx = scanState.enhancedCanvas.getContext('2d');
      ctx.drawImage(tmpCanvas, 0, 0);

      // Update the preview thumbnail to show progress
      scanPreviewImg.src = scanState.enhancedCanvas.toDataURL('image/jpeg', 0.7);
    } catch (err) {
      console.error('Stitch error:', err);
    } finally {
      try { frameMat && frameMat.delete(); } catch(e){}
      try { scaledH && scaledH.delete(); } catch(e){}
      try { warped && warped.delete(); } catch(e){}
    }
  }

  function finalizeScan() {
    if (!scanState.enhancedCanvas) {
      closeScanModal();
      return;
    }
    const dataUrl = scanState.enhancedCanvas.toDataURL('image/jpeg', 0.92);
    const img = new Image();
    img.onload = () => {
      loadReferenceFromImage(img, dataUrl);
      closeScanModal();
      const tiles = scanState.capturedTiles;
      const cells = coverageCount();
      showToast(`Scanned · ${tiles + 1} photos, ${cells}/${SCAN.gridR * SCAN.gridC} cells`);
    };
    img.src = dataUrl;
  }

  // ===== Wire up controls =====
  uploadBtn.addEventListener('click', () => fileInput.click());
  scanRefBtn.addEventListener('click', openScanModal);
  reScanBtn.addEventListener('click', openScanModal);
  fileInput.addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) loadReferenceFromFile(f);
    fileInput.value = '';
  });

  scanClose.addEventListener('click', closeScanModal);
  scanRetakeBtn.addEventListener('click', () => initScanState());
  scanDoneBtn.addEventListener('click', finalizeScan);

  liveBtn.addEventListener('click', () => {
    if (state.trackMode) { setTrackMode(false); return; }
    state.liveMode = !state.liveMode;
    liveBtn.classList.toggle('active', state.liveMode);
    showToast(state.liveMode ? 'Live match on' : 'Live match paused');
  });

  trackBtn.addEventListener('click', async () => {
    if (!state.cvReady) { showToast('Vision still loading'); return; }
    if (!state.refLoaded) { showToast('Add a reference image first'); return; }
    if (state.trackMode) { setTrackMode(false); return; }
    if (!state.trackReady) {
      const ok = await indexReference();
      if (!ok) return;
    }
    setTrackMode(true);
  });

  function setTrackMode(on) {
    state.trackMode = on;
    trackBtn.classList.toggle('track-active', on);
    liveBtn.classList.toggle('dimmed', on);
    if (on) {
      clearRefOverlay();
      slider.disabled = true;
      slider.style.opacity = 0.4;
      showToast('AR tracking on · aim at puzzle');
    } else {
      const ctx = camOverlay.getContext('2d');
      ctx && ctx.clearRect(0, 0, camOverlay.width, camOverlay.height);
      refOverlay.style.display = 'none';
      trackBadge.classList.add('hidden');
      if (state.lastH) { try { state.lastH.delete(); } catch(e){} state.lastH = null; }
      slider.disabled = false;
      slider.style.opacity = 1;
      showToast('AR tracking off');
    }
  }

  slider.addEventListener('input', () => {
    sliderVal.textContent = slider.value;
    if (!state.trackMode && state.lastOverlayColor && state.refLoaded) {
      drawRefOverlay(state.lastOverlayColor);
    }
  });

  freezeBtn.addEventListener('click', () => {
    if (state.frozen) {
      camFrozen.style.display = 'none';
      camVideo.style.display = '';
      state.frozen = false;
      freezeLbl.textContent = 'Freeze';
      freezeBtn.classList.remove('active');
    } else {
      if (!camVideo.videoWidth) { showToast('Camera not ready yet'); return; }
      camFrozen.width = camVideo.videoWidth;
      camFrozen.height = camVideo.videoHeight;
      camFrozen.getContext('2d').drawImage(camVideo, 0, 0);
      camFrozen.style.display = 'block';
      camVideo.style.display = 'none';
      state.frozen = true;
      freezeLbl.textContent = 'Live';
      freezeBtn.classList.add('active');
    }
  });

  clearBtn.addEventListener('click', () => {
    if (state.trackMode) {
      const ctx = camOverlay.getContext('2d');
      ctx && ctx.clearRect(0, 0, camOverlay.width, camOverlay.height);
      refOverlay.style.display = 'none';
      if (state.lastH) { try { state.lastH.delete(); } catch(e){} state.lastH = null; }
    } else {
      clearRefOverlay();
    }
  });

  swapBtn.addEventListener('click', () => {
    state.swapped = !state.swapped;
    if (state.swapped) {
      camPanel.classList.remove('large'); camPanel.classList.add('small');
      refPanel.classList.remove('small'); refPanel.classList.add('large');
    } else {
      camPanel.classList.remove('small'); camPanel.classList.add('large');
      refPanel.classList.remove('large'); refPanel.classList.add('small');
    }
    requestAnimationFrame(() => state.refLoaded && fitReferenceToStage());
  });

  window.addEventListener('resize', () => {
    if (state.refLoaded) requestAnimationFrame(fitReferenceToStage);
  });
  window.addEventListener('orientationchange', () => {
    setTimeout(() => state.refLoaded && fitReferenceToStage(), 300);
  });

  startCamera();
  if (typeof cv !== 'undefined' && cv.Mat) markCvReady();
})();
</script>
</body>
</html>
